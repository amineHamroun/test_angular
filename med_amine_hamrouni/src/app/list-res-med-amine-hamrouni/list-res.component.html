<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Liste des Résidences</h2>
    <a routerLink="/add-residence" class="btn btn-success">
      + Ajouter une résidence
    </a>
  </div>

  <div class="row g-3">
    <div class="col-md-4" *ngFor="let r of residences">
      <div class="card h-100 shadow-sm">
        <img
          *ngIf="r.image"
          [src]="r.image"
          class="card-img-top"
          alt="{{ r.name }}" />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ r.name }}</h5>
          <p class="card-text mb-1"><strong>Adresse :</strong> {{ r.address }}</p>
          <p class="card-text mb-2">
            <strong>Status :</strong>
            <span class="badge bg-info ms-1">{{ r.status }}</span>
          </p>

          <div class="mt-auto d-flex justify-content-between">
            <button
              class="btn btn-primary btn-sm me-1"
              (click)="viewDetails(r.id)">
              Détails
            </button>
            <button
              class="btn btn-warning btn-sm me-1"
              (click)="updateResidence(r.id)">
              Modifier
            </button>
            <button
              class="btn btn-danger btn-sm"
              (click)="deleteResidence(r.id)">
              Supprimer
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
