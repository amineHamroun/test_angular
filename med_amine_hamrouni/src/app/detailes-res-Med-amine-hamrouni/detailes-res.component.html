<div class="container mt-4" *ngIf="!loading && residence; else loadingTpl">
  <h2>Détails de la résidence</h2>

  <div class="card mt-3">
    <div class="card-body">
      <h4 class="card-title">{{ residence.name }}</h4>
      <p class="card-text"><strong>Adresse :</strong> {{ residence.address }}</p>
      <p class="card-text"><strong>Status :</strong> {{ residence.status }}</p>
      <p class="card-text" *ngIf="residence.created_at">
        <strong>Créée le :</strong>
        {{ residence.created_at | date:'short' }}
      </p>
      <p class="card-text" *ngIf="residence.updated_at">
        <strong>Dernière mise à jour :</strong>
        {{ residence.updated_at | date:'short' }}
      </p>
    </div>
  </div>

  <button class="btn btn-secondary mt-3" (click)="backToList()">
    Retour à la liste
  </button>
</div>

<ng-template #loadingTpl>
  <div class="container mt-4">
    <p *ngIf="!error">Chargement...</p>
    <p *ngIf="error" class="text-danger">{{ error }}</p>
  </div>
</ng-template>
